<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Tracker</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2129;
    --panel2: #222c37;
    --accent: #4caf85;
    --accent-hover: #3d9b71;
    --danger: #c0564b;
    --warning: #e8a23f;
    --text: #e6edf3;
    --muted: #8a97a5;
    --border: #2c3845;
    --unallocated: #3a424d;
    --lunch-color: #8a6bbf;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }

  header {
    text-align: center;
    padding: 18px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  #clock { font-size: 3.2rem; font-weight: 700; letter-spacing: 1px; line-height: 1; }
  #date  { font-size: 1.2rem; color: var(--muted); margin-top: 6px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }

  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
  input[type="text"], input[type="time"], input[type="date"], input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1rem;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .grid .full { grid-column: 1 / -1; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } .grid4 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 420px) { .grid4 { grid-template-columns: 1fr; } }

  #elapsed {
    font-size: 2.6rem;
    font-weight: 700;
    text-align: center;
    margin: 10px 0 18px;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  #elapsed.idle { color: var(--muted); }

  .btn {
    border: none;
    border-radius: 6px;
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
  }
  .btn-start { background: var(--accent); }
  .btn-start:hover { background: var(--accent-hover); }
  .btn-stop  { background: var(--danger); }
  .btn-row { display: flex; gap: 12px; justify-content: center; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .start-time-row { display: flex; gap: 10px; align-items: flex-end; }
  .start-time-row > div { flex: 1; }

  /* ---- TIMELINE STYLES ---- */
  .timeline-wrapper { margin-top: 16px; }
  .timeline-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
  .timeline-bar {
    display: flex;
    height: 32px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .timeline-segment {
    flex-shrink: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 600;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 4px;
    border-right: 1px solid rgba(0,0,0,0.2);
    transition: opacity 0.2s;
  }
  .timeline-segment:hover { opacity: 0.8; }
  .timeline-segment:last-child { border-right: none; }
  .timeline-unallocated { background: var(--unallocated); color: var(--muted); }
  .timeline-lunch { background: var(--lunch-color); color: #fff; }
  .timeline-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
    font-size: 0.8rem;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
  th, td { padding: 9px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; }
  td input { padding: 5px 7px; font-size: 0.9rem; }
  .dur { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .row-del {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 1.1rem; padding: 0 6px;
  }
  .running-tag {
    display: inline-block; font-size: 0.7rem; background: var(--accent);
    color: #fff; padding: 2px 7px; border-radius: 10px; margin-left: 6px;
  }

  h2 { font-size: 1.05rem; margin: 0 0 14px; }
  .totals { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .totals .big { font-size: 1.4rem; font-weight: 700; color: var(--accent); }

  .summary-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .task-name { font-weight: 600; }

  #status { text-align: center; color: var(--muted); font-size: 0.85rem; min-height: 18px; margin-top: 6px; }
  datalist { display: none; }

  .schedule-display {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-top: 12px;
    font-size: 0.92rem;
  }
  .sched-line { display: flex; justify-content: space-between; padding: 4px 0; }
  .sched-line.highlight { font-weight: 600; color: var(--accent); }
  .sched-line.gap-warning { color: var(--warning); }

  .schedule-section-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .schedule-subsection { margin-bottom: 14px; }

  .date-nav { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 14px; }
  .date-nav button { padding: 8px 12px; background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; }
  .date-nav button:hover { border-color: var(--accent); }
  .date-nav input[type="date"] { width: 160px; }

  .saving-indicator {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    margin-top: 8px;
    min-height: 16px;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div id="clock">--:--:--</div>
    <div id="date">Loading…</div>
  </header>

  <!-- DATE PICKER -->
  <div class="panel">
    <div class="date-nav">
      <button id="prevDayBtn">← Prev</button>
      <input type="date" id="dateInput">
      <button id="nextDayBtn">Next →</button>
      <button id="todayBtn">Today</button>
    </div>
  </div>

  <!-- WORK SCHEDULE -->
  <div class="panel">
    <h2>Work Schedule</h2>

    <div class="schedule-subsection">
      <div class="schedule-section-label">Working hours</div>
      <div class="grid4">
        <div>
          <label for="workStart">Start</label>
          <input type="time" id="workStart">
        </div>
        <div>
          <label for="workEnd">End</label>
          <input type="time" id="workEnd">
        </div>
        <div>
          <label for="lunchStart">Lunch start</label>
          <input type="time" id="lunchStart">
        </div>
        <div>
          <label for="lunchEnd">Lunch end</label>
          <input type="time" id="lunchEnd">
        </div>
      </div>
    </div>

    <div class="schedule-display">
      <div class="sched-line"><span>Target Hours:</span><span id="targetHours" class="dur">0h 00m</span></div>
      <div class="sched-line"><span>Lunch Break:</span><span id="lunchDuration" class="dur">—</span></div>
      <div class="sched-line"><span>Logged Hours:</span><span id="loggedHours" class="dur">0h 00m</span></div>
      <div class="sched-line highlight"><span>Unlogged Hours:</span><span id="unloggedHours" class="dur">0h 00m</span></div>
    </div>
    <div class="saving-indicator" id="schedSavingIndicator"></div>
  </div>

  <!-- TIMELINE -->
  <div class="panel" id="timelinePanel" style="display:none;">
    <h2>Day Timeline</h2>
    <div class="timeline-wrapper">
      <div class="timeline-labels">
        <span id="timelineStart">09:00</span>
        <span id="timelineMid">13:00</span>
        <span id="timelineEnd">17:00</span>
      </div>
      <div class="timeline-bar" id="timelineBar"></div>
      <div class="timeline-legend" id="timelineLegend"></div>
    </div>
  </div>

  <!-- TIMER PANEL (only show if viewing today) -->
  <div class="panel" id="timerPanel" style="display:none;">
    <div class="grid">
      <div class="full">
        <label for="taskInput">Task</label>
        <input type="text" id="taskInput" list="taskList" placeholder="e.g. Machine X" autocomplete="off">
        <datalist id="taskList"></datalist>
      </div>
      <div class="full">
        <label for="noteInput">Note / Description</label>
        <input type="text" id="noteInput" placeholder="e.g. Modelling, Detailing">
      </div>
      <div class="full start-time-row">
        <div>
          <label for="startTimeInput">Start Time (editable to backdate)</label>
          <input type="time" id="startTimeInput" step="60">
        </div>
      </div>
    </div>

    <div id="elapsed" class="idle">00:00:00</div>

    <div class="btn-row">
      <button class="btn btn-start" id="startBtn">Start</button>
      <button class="btn btn-stop" id="stopBtn" disabled>Stop</button>
    </div>
    <div id="status"></div>
  </div>

  <!-- DAILY LOG -->
  <div class="panel">
    <h2 id="logTitle">Today's Log</h2>
    <table>
      <thead>
        <tr>
          <th style="width:80px">Start</th>
          <th style="width:80px">End</th>
          <th style="width:90px">Duration</th>
          <th>Task</th>
          <th>Note</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
    <div class="totals">
      <span>Day Total</span>
      <span class="big" id="dailyTotal">0h 00m</span>
    </div>
  </div>

  <!-- PER-TASK SUMMARY -->
  <div class="panel">
    <h2>Per-Task Breakdown</h2>
    <div id="summary"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc, doc,
  query, where, orderBy, onSnapshot, Timestamp, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJXVZE2VZXPH9jJvzgz9ozBvvbiJfmLbw",
  authDomain: "teamdennisontracker.firebaseapp.com",
  projectId: "teamdennisontracker",
  storageBucket: "teamdennisontracker.firebasestorage.app",
  messagingSenderId: "915336870349",
  appId: "1:915336870349:web:c070e9b3fc0b688fe62c84"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const entriesRef = collection(db, "timeEntries");
const schedulesRef = collection(db, "workSchedules");

const UID = "default-user";

// ---- DOM refs ----
const $ = id => document.getElementById(id);
const clockEl = $("clock"), dateEl = $("date");
const dateInput = $("dateInput"), prevDayBtn = $("prevDayBtn"), nextDayBtn = $("nextDayBtn"), todayBtn = $("todayBtn");
const taskInput = $("taskInput"), noteInput = $("noteInput");
const startTimeInput = $("startTimeInput"), startBtn = $("startBtn"), stopBtn = $("stopBtn");
const elapsedEl = $("elapsed"), statusEl = $("status");
const logBody = $("logBody"), dailyTotalEl = $("dailyTotal"), summaryEl = $("summary");
const taskList = $("taskList");
const timerPanel = $("timerPanel"), logTitle = $("logTitle");
const workStart = $("workStart"), workEnd = $("workEnd");
const lunchStart = $("lunchStart"), lunchEnd = $("lunchEnd");
const targetHoursEl = $("targetHours"), loggedHoursEl = $("loggedHours");
const unloggedHoursEl = $("unloggedHours"), lunchDurationEl = $("lunchDuration");
const timelinePanel = $("timelinePanel"), timelineBar = $("timelineBar"), timelineLegend = $("timelineLegend");
const timelineStartEl = $("timelineStart"), timelineMidEl = $("timelineMid"), timelineEndEl = $("timelineEnd");
const schedSavingIndicator = $("schedSavingIndicator");

let selectedDate = new Date();
let entries = [];
let allTaskNames = new Set();
let runningEntry = null;
let tickHandle = null;
let unsubscribe = null;
let schedSaveTimeout = null;
let isLoadingSchedule = false;

// ---- helpers ----
const pad = n => String(n).padStart(2, "0");
function fmtClock(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function fmtDate(d) {
  return d.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}
function fmtHM(date) { return `${pad(date.getHours())}:${pad(date.getMinutes())}`; }
function timeInputValue(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function dateInputValue(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtDuration(mins) {
  const h = Math.floor(mins / 60), m = Math.round(mins % 60);
  return `${h}h ${pad(m)}m`;
}
function fmtStopwatch(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function startOfDate(d) { const c = new Date(d); c.setHours(0,0,0,0); return c; }
function endOfDate(d) { const c = new Date(d); c.setHours(23,59,59,999); return c; }
function dateStringsMatch(d1, d2) { return dateInputValue(d1) === dateInputValue(d2); }
function timeToMins(t) {
  if (!t) return null;
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ---- colour scheme ----
const taskColours = [
  "#FF6B6B","#4ECDC4","#45B7D1","#FFA07A","#98D8C8",
  "#F7DC6F","#BB8FCE","#85C1E2","#F8B88B","#52B788"
];
const taskColourMap = {};
let colourIndex = 0;
function getTaskColour(task) {
  if (!taskColourMap[task]) {
    taskColourMap[task] = taskColours[colourIndex % taskColours.length];
    colourIndex++;
  }
  return taskColourMap[task];
}

// ---- live clock ----
function updateClock() {
  const now = new Date();
  if (clockEl) clockEl.textContent = fmtClock(now);
  if (dateEl) dateEl.textContent = fmtDate(now);
}
updateClock();
setInterval(updateClock, 1000);

// ---- date picker ----
function updateDateInput() {
  if (dateInput) dateInput.value = dateInputValue(selectedDate);
  if (logTitle) {
    logTitle.textContent = dateStringsMatch(selectedDate, new Date())
      ? "Today's Log"
      : `Log for ${fmtDate(selectedDate)}`;
  }
  if (timerPanel) {
    timerPanel.style.display = dateStringsMatch(selectedDate, new Date()) ? "block" : "none";
  }
}
updateDateInput();

if (dateInput) {
  dateInput.addEventListener("change", e => {
    if (e.target.value) {
      const [y,m,d] = e.target.value.split("-").map(Number);
      selectedDate = new Date(y, m-1, d);
      updateDateInput();
      loadScheduleForDate();
      loadEntriesForDate();
    }
  });
}

if (prevDayBtn) {
  prevDayBtn.addEventListener("click", () => {
    selectedDate.setDate(selectedDate.getDate() - 1);
    updateDateInput(); loadScheduleForDate(); loadEntriesForDate();
  });
}

if (nextDayBtn) {
  nextDayBtn.addEventListener("click", () => {
    selectedDate.setDate(selectedDate.getDate() + 1);
    updateDateInput(); loadScheduleForDate(); loadEntriesForDate();
  });
}

if (todayBtn) {
  todayBtn.addEventListener("click", () => {
    selectedDate = new Date();
    updateDateInput(); loadScheduleForDate(); loadEntriesForDate();
  });
}

// ---- schedule: Firestore load / save ----
function scheduleDocId() {
  return `${UID}_${dateInputValue(selectedDate)}`;
}

async function loadScheduleForDate() {
  isLoadingSchedule = true;
  if (schedSavingIndicator) {
    schedSavingIndicator.textContent = "Loading schedule…";
  }

  try {
    const snap = await getDoc(doc(db, "workSchedules", scheduleDocId()));
    if (snap.exists()) {
      const d = snap.data();
      if (workStart) workStart.value = d.workStart || "";
      if (workEnd) workEnd.value = d.workEnd || "";
      if (lunchStart) lunchStart.value = d.lunchStart || "";
      if (lunchEnd) lunchEnd.value = d.lunchEnd || "";
    } else {
      if (workStart) workStart.value = "";
      if (workEnd) workEnd.value = "";
      if (lunchStart) lunchStart.value = "";
      if (lunchEnd) lunchEnd.value = "";
    }
    if (schedSavingIndicator) {
      schedSavingIndicator.textContent = "";
    }
    isLoadingSchedule = false;
    render();
  } catch (e) {
    console.error("Error loading schedule:", e);
    if (schedSavingIndicator) {
      schedSavingIndicator.textContent = "Error loading schedule";
    }
    isLoadingSchedule = false;
  }
}

function scheduleChanged() {
  if (isLoadingSchedule) return;
  clearTimeout(schedSaveTimeout);
  if (schedSavingIndicator) {
    schedSavingIndicator.textContent = "Saving…";
  }
  schedSaveTimeout = setTimeout(saveSchedule, 900);
}

async function saveSchedule() {
  try {
    await setDoc(doc(db, "workSchedules", scheduleDocId()), {
      uid: UID,
      date: dateInputValue(selectedDate),
      workStart:  workStart?.value || null,
      workEnd:    workEnd?.value || null,
      lunchStart: lunchStart?.value || null,
      lunchEnd:   lunchEnd?.value || null,
      lastModified: new Date()
    }, { merge: true });
    if (schedSavingIndicator) {
      schedSavingIndicator.textContent = "✓ Saved";
      setTimeout(() => { 
        if (schedSavingIndicator && schedSavingIndicator.textContent === "✓ Saved") {
          schedSavingIndicator.textContent = ""; 
        }
      }, 2000);
    }
  } catch (e) {
    console.error("Error saving schedule:", e);
    if (schedSavingIndicator) {
      schedSavingIndicator.textContent = "Error saving: " + e.message;
    }
  }
  render();
}

if (workStart) workStart.addEventListener("change", () => scheduleChanged());
if (workEnd) workEnd.addEventListener("change", () => scheduleChanged());
if (lunchStart) lunchStart.addEventListener("change", () => scheduleChanged());
if (lunchEnd) lunchEnd.addEventListener("change", () => scheduleChanged());

// ---- compute schedule hours ----
function computeScheduleInfo() {
  const ws = timeToMins(workStart?.value);
  const we = timeToMins(workEnd?.value);
  const ls = timeToMins(lunchStart?.value);
  const le = timeToMins(lunchEnd?.value);

  if (ws === null || we === null) return { targetMins: 0, lunchMins: 0, valid: false };

  let lunchMins = 0;
  if (ls !== null && le !== null && le > ls) {
    lunchMins = le - ls;
  }
  const targetMins = Math.max(0, we - ws - lunchMins);
  return { targetMins, lunchMins, ws, we, ls, le, valid: true };
}

// ---- start-time field ----
function primeStartTime() {
  if (startTimeInput) {
    startTimeInput.value = timeInputValue(new Date());
  }
}
primeStartTime();

function startDateFromInput() {
  const v = startTimeInput?.value;
  const base = new Date(selectedDate);
  if (!v) return base;
  const [h, m] = v.split(":").map(Number);
  base.setHours(h, m, 0, 0);
  return base;
}

// ---- stopwatch ----
function startTicking() {
  stopTicking();
  tickHandle = setInterval(() => {
    if (!runningEntry || !elapsedEl) return;
    const secs = (Date.now() - runningEntry.start.toMillis()) / 1000;
    elapsedEl.textContent = fmtStopwatch(secs);
  }, 1000);
}
function stopTicking() {
  if (tickHandle) clearInterval(tickHandle);
  tickHandle = null;
}

// ---- START ----
if (startBtn) {
  startBtn.addEventListener("click", async () => {
    const task = taskInput?.value?.trim();
    if (!task) {
      setStatus("Please enter a task name.");
      if (taskInput) taskInput.focus();
      return;
    }
    if (runningEntry) {
      setStatus("Stop the current timer first.");
      return;
    }
    const start = startDateFromInput();
    setStatus("Starting…");
    try {
      await addDoc(entriesRef, {
        uid: UID, task, note: noteInput?.value?.trim() || "",
        start: Timestamp.fromDate(start), end: null, durationMins: 0
      });
      setStatus("");
    } catch (e) {
      setStatus("Error: " + e.message);
    }
  });
}

// ---- STOP ----
if (stopBtn) {
  stopBtn.addEventListener("click", async () => {
    if (!runningEntry) return;
    const end = new Date();
    const mins = (end - runningEntry.start.toDate()) / 60000;
    setStatus("Stopping…");
    try {
      await updateDoc(doc(db, "timeEntries", runningEntry.id), {
        end: Timestamp.fromDate(end),
        durationMins: Math.max(0, mins)
      });
      if (taskInput) taskInput.value = "";
      if (noteInput) noteInput.value = "";
      primeStartTime();
      setStatus("");
    } catch (e) {
      setStatus("Error: " + e.message);
    }
  });
}

function setStatus(msg) {
  if (statusEl) statusEl.textContent = msg;
}

// ---- load entries ----
function loadEntriesForDate() {
  if (unsubscribe) unsubscribe();
  const q = query(
    entriesRef,
    where("uid", "==", UID),
    where("start", ">=", Timestamp.fromDate(startOfDate(selectedDate))),
    where("start", "<=", Timestamp.fromDate(endOfDate(selectedDate))),
    orderBy("start", "asc")
  );
  unsubscribe = onSnapshot(q, snap => {
    entries = [];
    snap.forEach(d => entries.push({ id: d.id, ...d.data() }));
    runningEntry = entries.find(e => e.end == null) || null;
    render();
  }, err => setStatus("Listener error: " + err.message));
}

// ---- task autocomplete ----
onSnapshot(query(entriesRef, where("uid", "==", UID)), snap => {
  allTaskNames = new Set();
  snap.forEach(d => { const t = d.data().task; if (t) allTaskNames.add(t); });
  if (taskList) {
    taskList.innerHTML = "";
    [...allTaskNames].sort().forEach(t => {
      const o = document.createElement("option");
      o.value = t;
      taskList.appendChild(o);
    });
  }
});

// ---- build timeline ----
function renderTimeline() {
  const info = computeScheduleInfo();
  if (!info.valid) {
    if (timelinePanel) timelinePanel.style.display = "none";
    return;
  }

  const { ws, we, ls, le, lunchMins } = info;
  const totalSpan = we - ws;
  if (totalSpan <= 0) {
    if (timelinePanel) timelinePanel.style.display = "none";
    return;
  }

  if (timelinePanel) timelinePanel.style.display = "block";

  // labels
  if (timelineStartEl) timelineStartEl.textContent = workStart?.value || "";
  if (timelineEndEl) timelineEndEl.textContent = workEnd?.value || "";
  if (timelineMidEl) {
    const midMins = Math.floor((ws + we) / 2);
    timelineMidEl.textContent = `${pad(Math.floor(midMins/60))}:${pad(midMins%60)}`;
  }

  // build a list of {startM, endM, type, task}
  const intervals = [];

  // add lunch interval if defined
  if (ls !== null && le !== null && le > ls) {
    intervals.push({ startM: ls, endM: le, type: "lunch" });
  }

  // add completed task entries
  entries.filter(e => e.end).forEach(entry => {
    const sd = entry.start.toDate();
    const ed = entry.end.toDate();
    const sm = sd.getHours()*60 + sd.getMinutes();
    const em = ed.getHours()*60 + ed.getMinutes();
    const cs = Math.max(sm, ws);
    const ce = Math.min(em, we);
    if (ce > cs) {
      intervals.push({ startM: cs, endM: ce, type: "task", task: entry.task });
    }
  });

  intervals.sort((a,b) => a.startM - b.startM);

  const blocks = [];
  let cursor = ws;

  for (const iv of intervals) {
    if (iv.startM >= we) break;
    const blockStart = Math.max(iv.startM, ws);
    const blockEnd = Math.min(iv.endM, we);
    if (blockEnd <= blockStart) continue;

    if (blockStart > cursor) {
      blocks.push({ startM: cursor, endM: blockStart, type: "unallocated" });
    }
    if (blockStart >= cursor) {
      blocks.push({ startM: blockStart, endM: blockEnd, type: iv.type, task: iv.task });
      cursor = Math.max(cursor, blockEnd);
    }
  }
  if (cursor < we) {
    blocks.push({ startM: cursor, endM: we, type: "unallocated" });
  }

  // render
  if (timelineBar) {
    timelineBar.innerHTML = "";
  }
  const legend = new Map();
  let hasUnallocated = false;

  blocks.forEach(block => {
    const pct = ((block.endM - block.startM) / totalSpan) * 100;
    const seg = document.createElement("div");
    seg.className = "timeline-segment";
    seg.style.width = pct + "%";

    if (block.type === "lunch") {
      seg.classList.add("timeline-lunch");
      seg.textContent = "Lunch";
      seg.title = `Lunch ${pad(Math.floor(ls/60))}:${pad(ls%60)}–${pad(Math.floor(le/60))}:${pad(le%60)}`;
    } else if (block.type === "task") {
      const colour = getTaskColour(block.task);
      seg.style.background = colour;
      seg.textContent = block.task;
      seg.title = block.task;
      if (!legend.has(block.task)) legend.set(block.task, colour);
    } else {
      seg.classList.add("timeline-unallocated");
      seg.textContent = "Unallocated";
      hasUnallocated = true;
    }
    if (timelineBar) timelineBar.appendChild(seg);
  });

  // legend
  if (timelineLegend) {
    timelineLegend.innerHTML = "";
    legend.forEach((colour, task) => {
      const item = document.createElement("div");
      item.className = "legend-item";
      const sw = document.createElement("div");
      sw.className = "legend-swatch";
      sw.style.background = colour;
      const lbl = document.createElement("span");
      lbl.textContent = task;
      item.appendChild(sw);
      item.appendChild(lbl);
      timelineLegend.appendChild(item);
    });

    // lunch in legend
    if (ls !== null && le !== null && le > ls) {
      const item = document.createElement("div");
      item.className = "legend-item";
      const sw = document.createElement("div");
      sw.className = "legend-swatch";
      sw.style.background = "var(--lunch-color)";
      const lbl = document.createElement("span");
      lbl.textContent = "Lunch";
      item.appendChild(sw);
      item.appendChild(lbl);
      timelineLegend.appendChild(item);
    }

    if (hasUnallocated) {
      const item = document.createElement("div");
      item.className = "legend-item";
      const sw = document.createElement("div");
      sw.className = "legend-swatch";
      sw.style.background = "var(--unallocated)";
      const lbl = document.createElement("span");
      lbl.textContent = "Unallocated";
      item.appendChild(sw);
      item.appendChild(lbl);
      timelineLegend.appendChild(item);
    }
  }
}

// ---- render ----
function render() {
  // Safety check
  if (!logBody || !dailyTotalEl || !summaryEl) {
    console.warn("Critical DOM elements not initialised");
    return;
  }

  if (runningEntry) {
    if (startBtn) startBtn.disabled = true;
    if (stopBtn) stopBtn.disabled = false;
    if (elapsedEl) elapsedEl.classList.remove("idle");
    if (taskInput) taskInput.value = runningEntry.task;
    if (noteInput) noteInput.value = runningEntry.note || "";
    if (startTimeInput) startTimeInput.value = timeInputValue(runningEntry.start.toDate());
    startTicking();
  } else {
    if (startBtn) startBtn.disabled = false;
    if (stopBtn) stopBtn.disabled = true;
    if (elapsedEl) {
      elapsedEl.classList.add("idle");
      elapsedEl.textContent = "00:00:00";
    }
    stopTicking();
  }

  // table
  logBody.innerHTML = "";
  let totalMins = 0;
  const byTask = {};

  entries.forEach(e => {
    const tr = document.createElement("tr");
    const startD = e.start.toDate();
    const endD = e.end ? e.end.toDate() : null;
    const mins = endD ? (endD - startD) / 60000 : (Date.now() - startD) / 60000;

    if (e.end) {
      totalMins += mins;
      byTask[e.task] = (byTask[e.task] || 0) + mins;
    }

    const tdStart = document.createElement("td");
    const startIn = document.createElement("input");
    startIn.type = "time";
    startIn.value = fmtHM(startD);
    startIn.addEventListener("change", () => editTime(e, "start", startIn.value));
    tdStart.appendChild(startIn);

    const tdEnd = document.createElement("td");
    if (endD) {
      const endIn = document.createElement("input");
      endIn.type = "time";
      endIn.value = fmtHM(endD);
      endIn.addEventListener("change", () => editTime(e, "end", endIn.value));
      tdEnd.appendChild(endIn);
    } else {
      tdEnd.innerHTML = '<span class="running-tag">running</span>';
    }

    const tdDur = document.createElement("td");
    tdDur.className = "dur";
    tdDur.textContent = fmtDuration(mins);

    const tdTask = document.createElement("td");
    const taskIn = document.createElement("input");
    taskIn.type = "text";
    taskIn.value = e.task;
    taskIn.addEventListener("change", () => editField(e, "task", taskIn.value.trim()));
    tdTask.appendChild(taskIn);

    const tdNote = document.createElement("td");
    const noteIn = document.createElement("input");
    noteIn.type = "text";
    noteIn.value = e.note || "";
    noteIn.addEventListener("change", () => editField(e, "note", noteIn.value.trim()));
    tdNote.appendChild(noteIn);

    const tdDel = document.createElement("td");
    const delBtn = document.createElement("button");
    delBtn.className = "row-del";
    delBtn.textContent = "✕";
    delBtn.title = "Delete";
    delBtn.addEventListener("click", () => removeEntry(e));
    tdDel.appendChild(delBtn);

    tr.append(tdStart, tdEnd, tdDur, tdTask, tdNote, tdDel);
    logBody.appendChild(tr);
  });

  dailyTotalEl.textContent = fmtDuration(totalMins);

  // schedule info
  const info = computeScheduleInfo();
  const unloggedMins = Math.max(0, info.targetMins - totalMins);
  if (targetHoursEl) targetHoursEl.textContent = fmtDuration(info.targetMins);
  if (loggedHoursEl) loggedHoursEl.textContent = fmtDuration(totalMins);
  if (unloggedHoursEl) unloggedHoursEl.textContent = fmtDuration(unloggedMins);
  if (lunchDurationEl) lunchDurationEl.textContent = info.lunchMins > 0 ? fmtDuration(info.lunchMins) : "—";

  if (unloggedMins > 0 && info.valid && unloggedHoursEl) {
    unloggedHoursEl.parentElement.classList.add("gap-warning");
  } else if (unloggedHoursEl) {
    unloggedHoursEl.parentElement.classList.remove("gap-warning");
  }

  renderTimeline();

  // summary
  summaryEl.innerHTML = "";
  const tasks = Object.keys(byTask).sort((a, b) => byTask[b] - byTask[a]);
  if (!tasks.length) {
    summaryEl.innerHTML = '<div style="color:var(--muted)">No completed entries for this day.</div>';
  } else {
    tasks.forEach(t => {
      const row = document.createElement("div");
      row.className = "summary-row";
      const colour = getTaskColour(t);
      row.innerHTML = `<span class="task-name"><span style="display:inline-block;width:8px;height:8px;background:${colour};border-radius:2px;margin-right:6px;vertical-align:middle;"></span>${escapeHtml(t)}</span><span class="dur">${fmtDuration(byTask[t])}</span>`;
      summaryEl.appendChild(row);
    });
  }
}

// ---- inline edits ----
async function editTime(entry, field, value) {
  if (!value) return;
  const [h, m] = value.split(":").map(Number);
  const base = entry[field] ? entry[field].toDate() : new Date();
  base.setHours(h, m, 0, 0);
  const update = { [field]: Timestamp.fromDate(base) };
  const s = field === "start" ? base : entry.start.toDate();
  const en = field === "end" ? base : (entry.end ? entry.end.toDate() : null);
  if (en) update.durationMins = Math.max(0, (en - s) / 60000);
  try {
    await updateDoc(doc(db, "timeEntries", entry.id), update);
  } catch (e) {
    setStatus("Error: " + e.message);
  }
}

async function editField(entry, field, value) {
  try {
    await updateDoc(doc(db, "timeEntries", entry.id), { [field]: value });
  } catch (e) {
    setStatus("Error: " + e.message);
  }
}

async function removeEntry(entry) {
  if (!confirm("Delete this entry?")) return;
  try {
    await deleteDoc(doc(db, "timeEntries", entry.id));
  } catch (e) {
    setStatus("Error: " + e.message);
  }
}

// ---- initial load ----
loadScheduleForDate();
loadEntriesForDate();
</script>
