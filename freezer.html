<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freezer Inventory</title>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0055a5;
      text-align: center;
      margin-bottom: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .back-button {
      display: inline-block;
      padding: 10px 20px;
      background: #6c757d;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.3s ease;
      font-size: 1rem;
    }

    .back-button:hover {
      background: #5a6268;
    }

    /* Freezer Selection Screen */
    .freezer-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .freezer-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .freezer-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.2);
    }

    .freezer-card.shed {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .freezer-card img {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
    }

    .freezer-card h2 {
      color: white;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .freezer-card p {
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
    }

    /* Freezer Details Screen */
    .freezer-details {
      display: none;
    }

    .freezer-details.active {
      display: block;
    }

    .freezer-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #0055a5;
    }

    .freezer-header h2 {
      color: #0055a5;
      font-size: 1.8rem;
    }

    /* Drawers Grid */
    .drawers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .drawer-card {
      background: #f9f9f9;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      transition: border-color 0.3s ease;
    }

    .drawer-card:hover {
      border-color: #0055a5;
      box-shadow: 0 2px 8px rgba(0,85,165,0.1);
    }

    .drawer-card h3 {
      color: #0055a5;
      margin-bottom: 1rem;
      font-size: 1.3rem;
      border-bottom: 2px solid #0055a5;
      padding-bottom: 0.5rem;
    }

    .drawer-contents {
      margin-bottom: 1rem;
      min-height: 100px;
    }

    .item {
      background: white;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      border-left: 4px solid #0055a5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
    }

    .item-text {
      flex-grow: 1;
    }

    .item-date {
      font-size: 0.8rem;
      color: #999;
      margin-right: 0.5rem;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.3s ease;
    }

    .delete-btn:hover {
      background: #c82333;
    }

    .empty-message {
      color: #999;
      font-style: italic;
      text-align: center;
      padding: 1rem;
    }

    /* Add Item Form */
    .add-item-form {
      background: #f0f8ff;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      border: 1px solid #0055a5;
    }

    .add-item-form h4 {
      color: #0055a5;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 0.75rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.3rem;
      color: #333;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .add-btn {
      width: 100%;
      padding: 0.75rem;
      background: #0055a5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .add-btn:hover {
      background: #003f7f;
    }

    /* Navigation */
    .navigation {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 2px solid #e0e0e0;
    }

    .nav-button {
      display: inline-block;
      padding: 10px 20px;
      background: #6c757d;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.3s ease;
      font-size: 1rem;
    }

    .nav-button:hover {
      background: #5a6268;
    }

    .nav-button.apps {
      background: #0055a5;
      margin-left: 1rem;
    }

    .nav-button.apps:hover {
      background: #003f7f;
    }

    p {
      text-align: center;
      color: #666;
      margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
      .drawers-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Main Freezer Selection Screen -->
    <div id="mainScreen" class="freezer-selector-screen">
      <div class="header">
        <h1>Freezer Inventory</h1>
        <a href="index.html" class="back-button">Back to Apps</a>
      </div>
      <p>Select a freezer to view and manage its contents</p>
      
      <div class="freezer-selector">
        <div class="freezer-card" onclick="selectFreezer('house')">
          <img src="https://img.icons8.com/ios-filled/80/ffffff/fridge.png" alt="House Freezer"/>
          <h2>House Freezer</h2>
          <p>3 Drawer Freezer</p>
        </div>
        <div class="freezer-card shed" onclick="selectFreezer('shed')">
          <img src="https://img.icons8.com/ios-filled/80/ffffff/fridge.png" alt="Shed Freezer"/>
          <h2>Shed Freezer</h2>
          <p>3 Drawer Freezer</p>
        </div>
      </div>
    </div>

    <!-- Freezer Details Screen -->
    <div id="detailsScreen" class="freezer-details">
      <div class="header">
        <button class="back-button" onclick="backToMain()">Back to Freezers</button>
        <h1 id="freezerTitle"></h1>
        <a href="index.html" class="back-button">Back to Apps</a>
      </div>

      <div class="drawers-grid" id="drawersContainer"></div>

      <div class="navigation">
        <button class="nav-button" onclick="backToMain()">Back to Freezers</button>
        <a href="index.html" class="nav-button apps">Back to Apps</a>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDJXVZE2VZXPH9jJvzgz9ozBvvbiJfmLbw",
      authDomain: "teamdennisontracker.firebaseapp.com",
      projectId: "teamdennisontracker",
      storageBucket: "teamdennisontracker.firebasestorage.app",
      messagingSenderId: "915336870349",
      appId: "1:915336870349:web:c070e9b3fc0b688fe62c84"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentFreezer = null;

    // Select a freezer
    function selectFreezer(freezerType) {
      currentFreezer = freezerType;
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('detailsScreen').classList.add('active');
      
      const title = freezerType === 'house' ? 'House Freezer' : 'Shed Freezer';
      document.getElementById('freezerTitle').textContent = title;

      renderFreezerContents(freezerType);
    }

    // Render freezer contents from Firebase
    function renderFreezerContents(freezerType) {
      const drawersContainer = document.getElementById('drawersContainer');
      drawersContainer.innerHTML = '';

      // Listen to Firebase for real-time updates
      db.collection('freezerInventory')
        .where('freezer', '==', freezerType)
        .orderBy('timestamp', 'asc')
        .onSnapshot((snapshot) => {
          const itemsByDrawer = {
            drawer1: [],
            drawer2: [],
            drawer3: []
          };

          snapshot.forEach((doc) => {
            const data = doc.data();
            const drawer = data.drawer;
            if (itemsByDrawer[drawer]) {
              itemsByDrawer[drawer].push({ id: doc.id, ...data });
            }
          });

          drawersContainer.innerHTML = '';

          for (let i = 1; i <= 3; i++) {
            const drawerKey = 'drawer' + i;
            const drawerItems = itemsByDrawer[drawerKey];
            
            const drawerHTML = createDrawerCard(freezerType, drawerKey, i, drawerItems);
            drawersContainer.innerHTML += drawerHTML;
          }

          // Add event listeners to delete buttons
          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const itemId = this.dataset.id;
              deleteItem(itemId);
            });
          });

          // Add event listeners to add buttons
          document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', function() {
              const freezer = this.dataset.freezer;
              const drawer = this.dataset.drawer;
              addItem(freezer, drawer);
            });
          });
        });
    }

    // Create drawer card HTML
    function createDrawerCard(freezerType, drawerKey, drawerNumber, items) {
      let itemsHTML = '';

      if (items.length === 0) {
        itemsHTML = '<div class="empty-message">No items in this drawer</div>';
      } else {
        items.forEach((item) => {
          const dateAdded = item.dateAdded ? new Date(item.dateAdded.toDate()).toLocaleDateString() : 'No date';
          itemsHTML += `
            <div class="item">
              <div class="item-text">
                <strong>${item.name}</strong>
                ${item.description ? '<br><small>' + item.description + '</small>' : ''}
              </div>
              <span class="item-date">${dateAdded}</span>
              <button class="delete-btn" data-id="${item.id}">Delete</button>
            </div>
          `;
        });
      }

      return `
        <div class="drawer-card">
          <h3>Drawer ${drawerNumber}</h3>
          <div class="drawer-contents">
            ${itemsHTML}
          </div>
          <div class="add-item-form">
            <h4>Add Item</h4>
            <div class="form-group">
              <label for="itemName_${drawerKey}">Item Name *</label>
              <input type="text" id="itemName_${drawerKey}" placeholder="e.g., Chicken Breasts" />
            </div>
            <div class="form-group">
              <label for="itemDesc_${drawerKey}">Description (Optional)</label>
              <textarea id="itemDesc_${drawerKey}" placeholder="e.g., 2kg pack, expires March 2025"></textarea>
            </div>
            <button class="add-btn" data-freezer="${freezerType}" data-drawer="${drawerKey}">Add to Drawer ${drawerNumber}</button>
          </div>
        </div>
      `;
    }

    // Add item to Firebase
    async function addItem(freezerType, drawerKey) {
      const nameInput = document.getElementById('itemName_' + drawerKey);
      const descInput = document.getElementById('itemDesc_' + drawerKey);
      
      const itemName = nameInput.value.trim();
      const itemDesc = descInput.value.trim();

      if (!itemName) {
        alert('Please enter an item name');
        return;
      }

      try {
        await db.collection('freezerInventory').add({
          freezer: freezerType,
          drawer: drawerKey,
          name: itemName,
          description: itemDesc,
          dateAdded: firebase.firestore.FieldValue.serverTimestamp(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Clear inputs
        nameInput.value = '';
        descInput.value = '';
      } catch (error) {
        console.error("Error adding item: ", error);
        alert('Failed to add item. Please try again.');
      }
    }

    // Delete item from Firebase
    async function deleteItem(itemId) {
      if (confirm('Are you sure you want to delete this item?')) {
        try {
          await db.collection('freezerInventory').doc(itemId).delete();
        } catch (error) {
          console.error("Error deleting item: ", error);
          alert('Failed to delete item. Please try again.');
        }
      }
    }

    // Back to main screen
    function backToMain() {
      document.getElementById('mainScreen').style.display = 'grid';
      document.getElementById('detailsScreen').classList.remove('active');
      currentFreezer = null;
    }
  </script>
</body>
</html>
