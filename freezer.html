<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freezer Inventory</title>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { color: #0055a5; text-align: center; margin-bottom: 2rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .back-button { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; transition: background 0.3s ease; font-size: 1rem; }
    .back-button:hover { background: #5a6268; }
    .freezer-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-bottom: 2rem; }
    .freezer-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 2rem; border-radius: 12px; text-align: center; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .freezer-card:hover { transform: translateY(-10px); box-shadow: 0 8px 12px rgba(0,0,0,0.2); }
    .freezer-card.shed { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .freezer-card img { width: 80px; height: 80px; margin-bottom: 1rem; }
    .freezer-card h2 { color: white; font-size: 1.5rem; margin-bottom: 0.5rem; }
    .freezer-card p { color: rgba(255,255,255,0.9); font-size: 0.9rem; }
    .freezer-details { display: none; }
    .freezer-details.active { display: block; }
    .drawers-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 2rem; }
    .drawer-card { background: #f9f9f9; border: 2px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; transition: border-color 0.3s ease; }
    .drawer-card:hover { border-color: #0055a5; box-shadow: 0 2px 8px rgba(0,85,165,0.1); }
    .drawer-card h3 { color: #0055a5; margin-bottom: 1rem; font-size: 1.3rem; border-bottom: 2px solid #0055a5; padding-bottom: 0.5rem; }
    .drawer-contents { margin-bottom: 1rem; min-height: 60px; }

    /* ── Item base style ── */
    .item {
      background: white;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      border-left: 4px solid #28a745;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
    }

    /* ── Age colour classes ── */
    .item.age-green {
      border-left-color: #28a745;
    }
    .item.age-green .item-name {
      color: #155724;
    }
    .item.age-green .item-date-display {
      color: #28a745;
    }

    .item.age-amber {
      border-left-color: #fd7e14;
    }
    .item.age-amber .item-name {
      color: #7d3c00;
    }
    .item.age-amber .item-date-display {
      color: #fd7e14;
    }

    .item.age-red {
      border-left-color: #dc3545;
    }
    .item.age-red .item-name {
      color: #721c24;
    }
    .item.age-red .item-date-display {
      color: #dc3545;
    }

    .item-text { flex-grow: 1; }

    /* ── Date area ── */
    .item-date-area {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-right: 0.5rem;
      flex-shrink: 0;
    }
    .item-date-display {
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .edit-date-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.1rem 0.2rem;
      border-radius: 3px;
      color: #999;
      transition: color 0.2s ease;
      line-height: 1;
    }
    .edit-date-btn:hover { color: #0055a5; }
    .date-edit-input {
      font-size: 0.78rem;
      padding: 0.2rem 0.3rem;
      border: 1px solid #0055a5;
      border-radius: 3px;
      display: none;
      width: 130px;
    }
    .save-date-btn, .cancel-date-btn {
      display: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-weight: bold;
    }
    .save-date-btn { background: #28a745; color: white; }
    .save-date-btn:hover { background: #1e7e34; }
    .cancel-date-btn { background: #6c757d; color: white; }
    .cancel-date-btn:hover { background: #5a6268; }

    /* ── Age badge ── */
    .age-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 10px;
      font-weight: bold;
      white-space: nowrap;
      margin-right: 0.4rem;
      flex-shrink: 0;
    }
    .age-green  .age-badge { background: #d4edda; color: #155724; }
    .age-amber  .age-badge { background: #ffe5d0; color: #7d3c00; }
    .age-red    .age-badge { background: #f8d7da; color: #721c24; }

    .delete-btn { background: #dc3545; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 3px; cursor: pointer; font-size: 0.85rem; transition: background 0.3s ease; flex-shrink: 0; }
    .delete-btn:hover { background: #c82333; }
    .empty-message { color: #999; font-style: italic; text-align: center; padding: 1rem; }
    .add-item-form { background: #f0f8ff; padding: 1rem; border-radius: 8px; margin-top: 1rem; border: 1px solid #0055a5; }
    .add-item-form h4 { color: #0055a5; margin-bottom: 1rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; margin-bottom: 0.3rem; color: #333; font-weight: bold; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-family: Arial, sans-serif; font-size: 0.9rem; box-sizing: border-box; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .add-btn { width: 100%; padding: 0.75rem; background: #0055a5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: background 0.3s ease; }
    .add-btn:hover { background: #003f7f; }
    .navigation { text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 2px solid #e0e0e0; }
    .nav-button { display: inline-block; padding: 10px 20px; background: #6c757d; color: white; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; transition: background 0.3s ease; font-size: 1rem; }
    .nav-button:hover { background: #5a6268; }
    .nav-button.apps { background: #0055a5; margin-left: 1rem; }
    .nav-button.apps:hover { background: #003f7f; }
    .subtitle { text-align: center; color: #666; margin-bottom: 2rem; }

    /* ── Colour key legend ── */
    .colour-key {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .colour-key-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #555;
    }
    .colour-key-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @media (max-width: 768px) { .drawers-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">

    <!-- Main Freezer Selection Screen -->
    <div id="mainScreen">
      <div class="header">
        <h1>Freezer Inventory</h1>
        <a href="index.html" class="back-button">Back to Apps</a>
      </div>
      <p class="subtitle">Select a freezer to view and manage its contents</p>
      <div class="freezer-selector">
        <div class="freezer-card" onclick="selectFreezer('house')">
          <img src="https://img.icons8.com/ios-filled/80/ffffff/fridge.png" alt="House Freezer"/>
          <h2>House Freezer</h2>
          <p>3 Drawer Freezer</p>
        </div>
        <div class="freezer-card shed" onclick="selectFreezer('shed')">
          <img src="https://img.icons8.com/ios-filled/80/ffffff/fridge.png" alt="Shed Freezer"/>
          <h2>Shed Freezer</h2>
          <p>3 Drawer Freezer</p>
        </div>
      </div>
    </div>

    <!-- Freezer Details Screen -->
    <div id="detailsScreen" class="freezer-details">
      <div class="header">
        <button class="back-button" onclick="backToMain()">Back to Freezers</button>
        <h1 id="freezerTitle"></h1>
        <a href="index.html" class="back-button">Back to Apps</a>
      </div>

      <!-- Colour key -->
      <div class="colour-key">
        <div class="colour-key-item">
          <div class="colour-key-dot" style="background:#28a745;"></div>
          <span>Under 3 months</span>
        </div>
        <div class="colour-key-item">
          <div class="colour-key-dot" style="background:#fd7e14;"></div>
          <span>3-4.5 months</span>
        </div>
        <div class="colour-key-item">
          <div class="colour-key-dot" style="background:#dc3545;"></div>
          <span>4.5+ months (throw out soon!)</span>
        </div>
      </div>

      <div class="drawers-grid" id="drawersContainer"></div>

      <div class="navigation">
        <button class="nav-button" onclick="backToMain()">Back to Freezers</button>
        <a href="index.html" class="nav-button apps">Back to Apps</a>
      </div>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDJXVZE2VZXPH9jJvzgz9ozBvvbiJfmLbw",
      authDomain: "teamdennisontracker.firebaseapp.com",
      projectId: "teamdennisontracker",
      storageBucket: "teamdennisontracker.firebasestorage.app",
      messagingSenderId: "915336870349",
      appId: "1:915336870349:web:c070e9b3fc0b689fe62c84"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentFreezer = null;
    let unsubscribeListener = null;

    // -------------------------------------------------------
    // Age helpers
    // -------------------------------------------------------

    /**
     * Returns the number of days since a Firestore Timestamp / JS Date.
     */
    function getDaysOld(dateAdded) {
      if (!dateAdded) return 0;
      try {
        const date = dateAdded.toDate ? dateAdded.toDate() : new Date(dateAdded);
        return (Date.now() - date.getTime()) / (1000 * 60 * 60 * 24);
      } catch (e) {
        return 0;
      }
    }

    /**
     * Returns a CSS class name based on how old the item is.
     * Green  : 0 - 90 days  (0 - 3 months)
     * Amber  : 90 - 135 days (3 - 4.5 months)
     * Red    : 135+ days     (4.5 - 6 months)
     */
    function getAgeClass(dateAdded) {
      const days = getDaysOld(dateAdded);
      if (days >= 135) return 'age-red';
      if (days >= 90)  return 'age-amber';
      return 'age-green';
    }

    /**
     * Returns a human-readable age string e.g. "45 days" or "3.2 months".
     */
    function getAgeLabel(dateAdded) {
      const days = getDaysOld(dateAdded);
      if (days < 1)   return 'Today';
      if (days < 31)  return Math.round(days) + 'd';
      return (days / 30.44).toFixed(1) + 'mo';
    }

    /**
     * Converts a Firestore Timestamp (or JS Date) to YYYY-MM-DD for <input type="date">.
     */
    function toInputDate(dateAdded) {
      if (!dateAdded) return '';
      try {
        const date = dateAdded.toDate ? dateAdded.toDate() : new Date(dateAdded);
        return date.toISOString().split('T')[0];
      } catch (e) {
        return '';
      }
    }

    /**
     * Converts a YYYY-MM-DD string to a Firestore Timestamp (noon local time).
     */
    function inputDateToTimestamp(value) {
      const date = new Date(value + 'T12:00:00');
      return firebase.firestore.Timestamp.fromDate(date);
    }

    // -------------------------------------------------------
    // Render drawer shells (forms only, no items yet)
    // -------------------------------------------------------
    function renderDrawerShells(freezerType) {
      const container = document.getElementById('drawersContainer');
      container.innerHTML = '';

      for (let i = 1; i <= 3; i++) {
        const drawerKey = 'drawer' + i;
        const card = document.createElement('div');
        card.className = 'drawer-card';
        card.id = 'card_' + drawerKey;
        card.innerHTML = `
          <h3>Drawer ${i}</h3>
          <div class="drawer-contents" id="contents_${drawerKey}">
            <div class="empty-message">No items in this drawer</div>
          </div>
          <div class="add-item-form">
            <h4>Add Item</h4>
            <div class="form-group">
              <label for="itemName_${drawerKey}">Item Name *</label>
              <input type="text" id="itemName_${drawerKey}" placeholder="e.g., Chicken Breasts" />
            </div>
            <div class="form-group">
              <label for="itemDesc_${drawerKey}">Description (Optional)</label>
              <textarea id="itemDesc_${drawerKey}" placeholder="e.g., 2kg pack, expires March 2025"></textarea>
            </div>
            <div class="form-group">
              <label for="itemDate_${drawerKey}">Date Added *</label>
              <input type="date" id="itemDate_${drawerKey}" />
            </div>
            <button class="add-btn"
              data-freezer="${freezerType}"
              data-drawer="${drawerKey}"
              data-drawer-num="${i}">
              Add to Drawer ${i}
            </button>
          </div>
        `;
        container.appendChild(card);

        // Pre-fill date field with today
        document.getElementById('itemDate_' + drawerKey).value = new Date().toISOString().split('T')[0];
      }
    }

    // -------------------------------------------------------
    // Subscribe to Firestore and update drawer contents
    // -------------------------------------------------------
    function subscribeToFreezer(freezerType) {
      if (unsubscribeListener) {
        unsubscribeListener();
        unsubscribeListener = null;
      }

      unsubscribeListener = db.collection('freezerInventory')
        .where('freezer', '==', freezerType)
        .onSnapshot((snapshot) => {
          const itemsByDrawer = { drawer1: [], drawer2: [], drawer3: [] };

          snapshot.forEach((doc) => {
            const data = doc.data();
            if (itemsByDrawer[data.drawer] !== undefined) {
              itemsByDrawer[data.drawer].push({ id: doc.id, ...data });
            }
          });

          // Sort each drawer by timestamp ascending (oldest first)
          for (const key in itemsByDrawer) {
            itemsByDrawer[key].sort((a, b) => {
              const ta = a.timestamp ? a.timestamp.toMillis() : 0;
              const tb = b.timestamp ? b.timestamp.toMillis() : 0;
              return ta - tb;
            });
          }

          for (let i = 1; i <= 3; i++) {
            const drawerKey = 'drawer' + i;
            const contentsDiv = document.getElementById('contents_' + drawerKey);
            if (!contentsDiv) continue;

            const items = itemsByDrawer[drawerKey];

            if (items.length === 0) {
              contentsDiv.innerHTML = '<div class="empty-message">No items in this drawer</div>';
            } else {
              contentsDiv.innerHTML = items.map(item => {
                const ageClass   = getAgeClass(item.dateAdded);
                const ageLabel   = getAgeLabel(item.dateAdded);
                const inputVal   = toInputDate(item.dateAdded);
                let   dateStr    = 'No date';
                try {
                  if (item.dateAdded) {
                    dateStr = item.dateAdded.toDate().toLocaleDateString('en-GB');
                  }
                } catch(e) {}

                return `
                  <div class="item ${ageClass}" data-id="${item.id}">
                    <div class="item-text">
                      <strong class="item-name">${item.name}</strong>
                      ${item.description ? '<br><small>' + item.description + '</small>' : ''}
                    </div>

                    <!-- Age badge + date display / edit controls -->
                    <span class="age-badge">${ageLabel}</span>

                    <div class="item-date-area">
                      <!-- Display mode -->
                      <span class="item-date-display" id="dateDisplay_${item.id}">${dateStr}</span>
                      <button
                        class="edit-date-btn"
                        id="editDateBtn_${item.id}"
                        data-id="${item.id}"
                        title="Edit date in freezer">✏</button>

                      <!-- Edit mode (hidden by default) -->
                      <input
                        type="date"
                        class="date-edit-input"
                        id="dateInput_${item.id}"
                        value="${inputVal}" />
                      <button
                        class="save-date-btn"
                        id="saveDateBtn_${item.id}"
                        data-id="${item.id}"
                        title="Save date">✓</button>
                      <button
                        class="cancel-date-btn"
                        id="cancelDateBtn_${item.id}"
                        data-id="${item.id}"
                        title="Cancel">✗</button>
                    </div>

                    <button class="delete-btn" data-id="${item.id}">Delete</button>
                  </div>
                `;
              }).join('');
            }
          }
        }, (error) => {
          console.error("Firestore error:", error);
        });
    }

    // -------------------------------------------------------
    // Select a freezer
    // -------------------------------------------------------
    function selectFreezer(freezerType) {
      currentFreezer = freezerType;
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('detailsScreen').classList.add('active');
      document.getElementById('freezerTitle').textContent =
        freezerType === 'house' ? 'House Freezer' : 'Shed Freezer';

      renderDrawerShells(freezerType);
      subscribeToFreezer(freezerType);
    }

    // -------------------------------------------------------
    // Back to main screen
    // -------------------------------------------------------
    function backToMain() {
      if (unsubscribeListener) {
        unsubscribeListener();
        unsubscribeListener = null;
      }
      document.getElementById('mainScreen').style.display = '';
      document.getElementById('detailsScreen').classList.remove('active');
      currentFreezer = null;
    }

    // -------------------------------------------------------
    // Toggle edit-date mode helpers
    // -------------------------------------------------------
    function enterEditMode(itemId) {
      document.getElementById('dateDisplay_' + itemId).style.display  = 'none';
      document.getElementById('editDateBtn_' + itemId).style.display  = 'none';
      document.getElementById('dateInput_'   + itemId).style.display  = 'block';
      document.getElementById('saveDateBtn_' + itemId).style.display  = 'block';
      document.getElementById('cancelDateBtn_' + itemId).style.display = 'block';
    }

    function exitEditMode(itemId) {
      document.getElementById('dateDisplay_' + itemId).style.display  = 'block';
      document.getElementById('editDateBtn_' + itemId).style.display  = 'block';
      document.getElementById('dateInput_'   + itemId).style.display  = 'none';
      document.getElementById('saveDateBtn_' + itemId).style.display  = 'none';
      document.getElementById('cancelDateBtn_' + itemId).style.display = 'none';
    }

    // -------------------------------------------------------
    // Event delegation for Add, Delete, and Date Edit buttons
    // -------------------------------------------------------
    document.addEventListener('click', async (e) => {

      // DELETE
      if (e.target.classList.contains('delete-btn')) {
        const itemId = e.target.dataset.id;
        if (confirm('Are you sure you want to delete this item?')) {
          try {
            await db.collection('freezerInventory').doc(itemId).delete();
          } catch (error) {
            console.error("Error deleting item:", error);
            alert('Failed to delete item. Please try again.');
          }
        }
      }

      // EDIT DATE: Enter edit mode
      if (e.target.classList.contains('edit-date-btn')) {
        const itemId = e.target.dataset.id;
        enterEditMode(itemId);
        document.getElementById('dateInput_' + itemId).focus();
      }

      // SAVE DATE
      if (e.target.classList.contains('save-date-btn')) {
        const itemId = e.target.dataset.id;
        const newDateStr = document.getElementById('dateInput_' + itemId).value;

        if (!newDateStr) {
          alert('Please select a valid date.');
          return;
        }

        try {
          const newTimestamp = inputDateToTimestamp(newDateStr);
          await db.collection('freezerInventory').doc(itemId).update({
            dateAdded: newTimestamp,
            timestamp: newTimestamp
          });
          exitEditMode(itemId);
        } catch (error) {
          console.error("Error saving date:", error);
          alert('Failed to save date. Please try again.');
        }
      }

      // CANCEL DATE EDIT
      if (e.target.classList.contains('cancel-date-btn')) {
        const itemId = e.target.dataset.id;
        exitEditMode(itemId);
      }

      // ADD ITEM
      if (e.target.classList.contains('add-btn')) {
        const freezerType = e.target.dataset.freezer;
        const drawerKey   = e.target.dataset.drawer;

        const nameInput = document.getElementById('itemName_' + drawerKey);
        const descInput = document.getElementById('itemDesc_' + drawerKey);
        const dateInput = document.getElementById('itemDate_' + drawerKey);

        const itemName = nameInput.value.trim();
        const itemDesc = descInput.value.trim();
        const itemDateStr = dateInput.value;

        if (!itemName) {
          alert('Please enter an item name.');
          return;
        }

        if (!itemDateStr) {
          alert('Please select a date.');
          return;
        }

        try {
          const dateTimestamp = inputDateToTimestamp(itemDateStr);
          await db.collection('freezerInventory').add({
            freezer:     freezerType,
            drawer:      drawerKey,
            name:        itemName,
            description: itemDesc,
            dateAdded:   dateTimestamp,
            timestamp:   dateTimestamp
          });
          nameInput.value = '';
          descInput.value = '';
          dateInput.value = new Date().toISOString().split('T')[0];
        } catch (error) {
          console.error("Error adding item:", error);
          alert('Failed to add item. Please try again.');
        }
      }
    });
  </script>
</body>
</html>
